name: Validate vocabulary pipeline

on:
  pull_request:
    paths:
      - "dropbox/**"

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: uv sync

      - name: Run pipeline
        run: make pipeline DRY="--dry-run"

      - name: Validate expected processing effects
        run: |
          test -z "$(ls -A dropbox)" || (echo "Expected dropbox to be empty after processing" && exit 1)
          test -n "$(ls -A archive)" || (echo "Expected archive to contain processed YAML files" && exit 1)
          test -n "$(ls -A unpublished)" || (echo "Expected unpublished to contain generated assertions" && exit 1)
