name: Validate vocabulary pipeline

on:
  pull_request:
    paths:
      - "dropbox/**"

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: uv sync

      - name: Run pipeline (NO COMMIT)
        run: make pipeline DRY="--dry-run"

      - name: Ensure repo unchanged
        run: git diff --exit-code
